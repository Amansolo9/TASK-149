[versions]
agp = "8.2.2"
kotlin = "1.9.22"
ksp = "1.9.22-1.0.17"
room = "2.6.1"
koin = "3.5.3"
navigation = "2.7.7"
workmanager = "2.9.0"
coroutines = "1.7.3"
lifecycle = "2.7.0"
