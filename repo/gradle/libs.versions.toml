appcompat = "1.6.1"
constraintlayout = "2.1.4"
material = "1.11.0"
security-crypto = "1.1.0-alpha06"
recyclerview = "1.3.2"
junit = "4.13.2"
mockk = "1.13.9"
turbine = "1.0.0"
truth = "1.4.2"
test-runner = "1.5.2"
test-core = "1.5.0"
